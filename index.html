<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <!-- TAILWIND LINK -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS STYLE -->
    <link rel="stylesheet" href="style.css">

    <!--BOOTSTRAP ICON-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!--FONT-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica+SC&family=Irish+Grover&display=swap"
        rel="stylesheet">

</head>

<body class="bg-black overflow-x-hidden">

    <!-- NAV BAR (Moved outside landing container) -->
    <div class="bg-black h-[55px] rounded-lg m-4 md:m-8 flex items-center justify-between px-4 sticky top-0 z-50">

        <!-- Logo -->
        <div class="mt-4">
            <img class="h-[120px] md:h-[160px] object-contain" src="./image/HappyBounty.png" alt="">
        </div>

        <!-- Desktop Menu -->
        <div class="hidden font md:flex flex-row gap-6 items-center font-semibold">

            <button class="text-white border border-white rounded-lg px-4 h-[38px] hover:bg-white hover:text-black">
                Resources
            </button>

            <button class="text-white border border-white rounded-lg px-4 h-[38px] hover:bg-white hover:text-black">
                Categories
            </button>

            <!-- Search -->
            <div class="relative border border-white rounded-lg px-4 h-[38px] w-[300px] flex items-center">
                <input type="search" placeholder="Search project"
                    class="bg-transparent outline-none text-white w-[250px]">
                <i class="bi bi-search absolute right-3 cursor-pointer text-white text-sm"></i>
            </div>

            <button
                class="text-white border border-white rounded-lg px-4 h-[38px] hover:bg-white hover:text-black font-semibold">
                Login
            </button>

            <button class="text-black bg-white rounded-lg px-4 h-[38px] hover:bg-black hover:text-white font-semibold">
                Sign up
            </button>

        </div>

        <!-- Mobile Hamburger -->
        <button id="btn" class="md:hidden text-white text-2xl">
            <i class="bi bi-list"></i>
        </button>

    </div>


    <!-- LANDING PAGE -->
    <div class="landind logo border border-white rounded-lg h-auto py-2 m-8">

        <!-- HERO -->
        <div class="flex flex-col px-[2rem] gap-2 md:px-[5rem] py-3">

            <h1 class="text-white text-6xl">
                Make a <br>
                living from <br>
                Web3
            </h1>

            <p class="text-white text-[14px]">
                Complete quests and earn cryptocurrency, tokens, and digital rewards
            </p>

            <button
                class="flex items-center text-white bg-gray-800 rounded-lg px-4 py-2 h-[38px] w-fit border border-white/70 hover:bg-white hover:text-black font-semibold">
                How to earn &nbsp;&nbsp;
                <i class="bi bi-arrow-right text-xl mt-1"></i>
            </button>

        </div>

    </div>


    <!-- SECTION TWO -->
    <div
        class="flex justify-between items-center gap-2 border border-white/70 rounded-lg m-10 text-white bg-gray-800 px-4 h-[38px] w-fit md:m-14">
        <p class="text-[14px]">All Tasks</p>

        <div class="border border-white/70 text-white bg-gray-800 text-[12px] px-2 font-semibold">
            300
        </div>
    </div>


    <!-- SEARCH + SORT -->
    <div class="flex justify-between gap-2 items-center m-8">

        <div class="relative border border-white/50 rounded-lg px-4 h-[38px] md:w-[800px] flex items-center w-[200px]">

            <input type="search" placeholder="Search project"
                class="bg-transparent outline-none text-white md:w-[750px] w-[150px]">

            <span class="border border-white/50 h-[38px]"></span>

            <i class="bi bi-search absolute right-3 cursor-pointer text-white text-sm"></i>

        </div>

        <!-- MOBILE -->
        <h4 class="flex text-white md:hidden">Sort by</h4>

        <!-- DESKTOP -->
        <button
            class="hidden md:flex items-center text-[16px] text-white border border-white bg-gray-800 rounded-lg px-4 h-[38px] hover:bg-white/80 hover:text-black font-semibold">
            Sort by
        </button>

    </div>


    <!-- GRID -->
    <div class="grid grid-cols-1 gap-2 m-8 md:grid-cols-2 md:gap-6 md:m-10">

        <div class="bg-[#2D2D2D] rounded-[17px] h-fit max-w-[581px] border border-white/50 ">

            <div class="flex justify-between items-center gap-6 px-2 md:px-4">

                <h3 class="text-white text-sm md:text-[18px]">Category tag, eg “Design”</h3>

                <div class="relative flex flex-col items-center gap-2 py-1">
                    <span class="absolute top-0 right-[8rem] md:right-[10rem] border h-[66px] border-white/50"></span>
                    <h4 class="flex flex-row gap-4 items-center text-white text-xs md:text-[14px]">
                        <p class="bg-white rounded-full w-[35px] h-[26px]"></p> Rewards
                    </h4>
                    <p class="text-white text-xs md:text-[16px]">eg: 25 BASE ETH</p>

                </div>

            </div>

            <!-- BORDER -->
            <div class="border-b border-white/50 w-full mt-2"></div>

            <!-- TEXT -->
            <div class="flex flex-col gap-6 m-4">
                <h3 class="text-white text-sm md:text-md">Task Title:</h3>
                <p class="text-white text-xs md:text-sm">Brief description (1–2 lines)</p>
                <h3 class="text-white text-sm md:text-md">Tags: Development, GitHub, UX etc</h3>
                <h3 class="text-white text-sm md:text-md">🗓 Deadline: Apr 10 | Status: Open</h3>
               
                <div>

                </div>
            </div>


        </div>

        <div class="bg-[#2D2D2D] rounded-[17px] h-[200px] max-w-[581px] md:h-[279px]"></div>

    </div>

</body>

</html>
