<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <!-- TAILWIND LINK -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS STYLE -->
    <link rel="stylesheet" href="style.css">

    <!--BOOSTRAP LINK-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!--CLOUDFLARE ICON LINK-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body class="bg-black overflow-x-hidden">


    <!-- LANDING PAGE -->
    <div class="landind logo border-[1px] border-white rounded-lg h-auto py-2 m-8">

        <!-- NAV BAR -->
        <!-- NAV BAR -->
        <div
            class="bg-[#212121DE]/100 h-[55px] rounded-lg m-4 md:m-8 flex items-center justify-between px-4 sticky top-0 z-50">

            <!-- Logo -->
            <button class="text-white text-[16px] border border-white rounded-lg px-4 h-[38px]">
                Our logo
            </button>

            <!-- Desktop Menu -->
            <div class="hidden md:flex flex-row gap-6 items-center font-semifont">
                <button
                    class="text-white border border-white rounded-lg px-4 h-[38px] hover:bg-white hover:text-black">Resources</button>
                <button
                    class="text-white border border-white rounded-lg px-4 h-[38px] hover:bg-white hover:text-black">Categories</button>

                <!-- Search -->
                <div class="relative border border-white rounded-lg px-4 h-[38px] w-[300px] flex items-center">
                    <input type="search" placeholder="Search project"
                        class="bg-transparent outline-none text-white w-[250px]">
                    <i class="bi bi-search absolute right-3 text-white text-sm"></i>
                </div>

                <button
                    class="text-white border border-white rounded-lg px-4 h-[38px] hover:bg-white hover:text-black font-semibold">Login</button>
                <button
                    class="logo text-black bg-white rounded-lg px-4 h-[38px] hover:bg-black hover:text-white font-semifont">Sign
                    up</button>
            </div>

            <!-- Mobile Hamburger -->
            <button id="btn" class="md:hidden text-white text-2xl">
                <i class="bi bi-list"></i>
            </button>

        </div>

        <div class="flex flex-col px-[2rem] gap-2 logo  md:px-[5rem] py-3">
            <h1 class="logo text-white text-6xl">Make a
                <br>
                living from
                <br>
                Web3
            </h1>

            <p class="text-white  text-[14px]">Complete quests and earn cryptocurrency, tokens, and
                digital rewards</p>

            <!-- HERO BUTTON-->
            <button
                class="logo flex items-center text-white bg-gray-800 rounded-lg px-4 py-2 h-[38px] w-fit border border-white/70 hover:bg-white hover:text-black font-semifont">How
                to earn &nbsp; &nbsp; <i class="bi bi-arrow-right text-xl mt-1"></i></button>
        </div>
    </div>

    <!-- SECETION TWO -->
    <div
        class="logo flex justify-between items-center gap-2 border border-white/70 rounded-lg m-10 text-white bg-gray-800 rounded-lg px-4 h-[38px] w-fit md:m-14">
        <p class="text-[14px]">All Tasks</p>
        <div class="border border-white/70 text-white bg-gray-800 h-auto text-[12px] px-2 font-semibold">
            300
        </div>
    </div>

    <div class="flex justify-between gap-2 items-center m-8">
        <!-- Search -->
        <div class="relative border border-white rounded-lg px-4 h-[38px] md:w-[800px] flex items-center w-[200px]">
            <input type="search" placeholder="Search project"
                class="bg-transparent outline-none text-white md:w-[750px] w-[150px]">
            <i class="bi bi-search absolute right-3 text-white text-sm"></i>
        </div>

        <!-- FOR MOBILE-->
        <h4 class="flex text-white  md:hidden">Sort by</h4>

        <!-- FOR DESKTOP -->
        <button
            class="hidden md:flex  items-center  text-[16px]  logo text-white border border-white bg-gray-800 rounded-lg px-4 h-[38px] w-fit hover:bg-white/80 hover:text-black font-semifont">Sort
            by </button>
    </div>
